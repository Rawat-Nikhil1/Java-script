<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> JavaScript Tutorial</h1>
    <button id="start">START</button>
    <button id="stop">STOP</button>
</body>
<script>
    // const interval = function(str){
        // console.log(str, Date.now()); 
    // }
    // const IntervalId= setInterval(interval,1000,"hi")

    let interval = null;
    const strt = document.querySelector('#start')
    strt.addEventListener('click',function(){
        interval = setInterval(function(){
            console.log("Nikhil",Date.now())
        },1000)
    },false)

    const end = document.querySelector('#stop')
    end.addEventListener('click',function(){
        clearInterval(interval)
    },false)
</script>
</html>
